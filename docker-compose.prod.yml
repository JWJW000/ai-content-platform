version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: ai-content-db
    restart: always
    environment:
      POSTGRES_DB: ai_content
      POSTGRES_USER: ai_content
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # Backend API (Rust)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-content-backend
    restart: always
    environment:
      DATABASE_URL: postgres://ai_content:${DB_PASSWORD}@db:5432/ai_content
      RUST_LOG: info
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - app-network

  # Frontend (React + Nginx)
  frontend:
    image: nginx:alpine
    container_name: ai-content-frontend
    restart: always
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
