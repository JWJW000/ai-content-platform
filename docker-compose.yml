version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: ai-content-db
    restart: always
    environment:
      POSTGRES_DB: ai_content
      POSTGRES_USER: ai_content
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ai_content123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

  # Backend API (Rust)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-content-backend
    restart: always
    environment:
      DATABASE_URL: postgres://ai_content:${DB_PASSWORD:-ai_content123}@db:5432/ai_content
      RUST_LOG: info
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - app-network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-content-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
