name: Build & Release macOS App

on:
  push:
    branches: [master]
    paths:
      - 'net_guard/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Release
        working-directory: ./net_guard
        run: |
          cargo build --release

      - name: Package binary
        working-directory: ./net_guard
        run: |
          mkdir -p dist
          cp target/release/net_guard dist/
          tar -czvf net_guard-macos.tar.gz dist/net_guard
          ls -la *.gz

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.1.0
          release_name: NetGuard v0.1.0
          draft: false
          prerelease: false
          files: |
            net_guard/*.tar.gz
          body: |
            # NetGuard - macOS Network Traffic Monitor (CLI)
            
            A terminal-based network traffic monitor for macOS.
            
            ## Features
            - 🌐 Real-time network traffic monitoring
            - 📊 Process-level traffic ranking
            - 📈 Historical data (7 days)
            - 🖥️ Terminal UI (ratatui)
            
            ## Installation
            1. Download the .tar.gz file
            2. Extract: `tar -xzf net_guard-macos.tar.gz`
            3. Run: `./dist/net_guard`
            4. Press 'q' or 'Esc' to quit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
