name: Build macOS Binary

on:
  push:
    branches: [master]
    paths:
      - 'net_guard/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Release
        working-directory: ./net_guard
        run: |
          cargo build --release

      - name: Package binary
        working-directory: ./net_guard
        run: |
          mkdir -p dist
          cp target/release/net_guard dist/
          tar -czvf net_guard-macos.tar.gz dist/net_guard
          ls -la *.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: net_guard-macos-binary
          path: net_guard/*.tar.gz
          retention-days: 30
